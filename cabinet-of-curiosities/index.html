<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>The Cabinet of Curiosities · Martyna Zwoińska</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#14171a;--surface:#1c2024;--text:#eceef0;--soft:#b3bcc4;--emerald:#5fcb9d;--gold:#d2b66f;--violet:#c1a4ca;--display:'Cormorant Garamond',Georgia,serif;--sans:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
    @media(prefers-color-scheme:dark){:root{--bg:#14171a;--surface:#1c2024;--text:#eceef0;--soft:#b3bcc4;--emerald:#5fcb9d;--gold:#d2b66f;--violet:#c1a4ca}}
    :root[data-theme=dark]{--bg:#14171a;--surface:#1c2024;--text:#eceef0;--soft:#b3bcc4;--emerald:#5fcb9d;--gold:#d2b66f;--violet:#c1a4ca}
    :root[data-theme=light]{--bg:#fbfaf7;--surface:#fff;--text:#1f2328;--soft:#55606b;--emerald:#1c7a52;--gold:#a88445;--violet:#6b4a73}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);line-height:1.6}.page{width:100%;margin:0;padding:0 0 32px}.top{position:absolute;inset:18px 20px auto;z-index:2;display:flex;justify-content:space-between;align-items:center;gap:16px}a{color:var(--emerald);font-weight:650}.top a,.theme{background:rgba(11,13,15,.78);backdrop-filter:blur(7px);border:1px solid rgba(95,203,157,.65);border-radius:999px;padding:8px 14px;color:#eceef0;text-decoration:none}.theme{font:inherit;cursor:pointer}h1{position:absolute;z-index:2;left:50%;top:72px;transform:translateX(-50%);width:min(90%,900px);margin:0;color:#fff;text-align:center;text-shadow:0 2px 18px #000;font-family:var(--display);font-size:clamp(2.5rem,6vw,5.2rem);line-height:1}.cabinet-frame{margin:0;width:100%;height:100vh;background:var(--bg)}.cabinet-frame img{display:block;width:100%;height:100%;object-fit:contain}.note{text-align:center;color:var(--soft);font-family:var(--display);font-size:1.4rem;margin:20px 12px 8px}.back{display:block;text-align:center}a:focus-visible,.theme:focus-visible{outline:3px solid var(--gold);outline-offset:4px}@media(max-width:600px){.top{inset:10px 10px auto}.top a,.theme{padding:6px 10px;font-size:.86rem}h1{top:62px;font-size:clamp(2.2rem,12vw,3.6rem)}.cabinet-frame{height:100svh}.cabinet-frame img{object-fit:contain}}
  </style>
</head>
<body>
  <main class="page">
    <header class="top"><a href="../">← Homepage</a><button class="theme" id="themeToggle" type="button" aria-pressed="false">Toggle theme</button></header>
    <h1>The Cabinet of Curiosities</h1>
    <figure class="cabinet-frame"><img src="assets/cabinet-of-curiosities.png" alt="Art Nouveau cabinet display containing chocolate wrappers, two crocheted eye motifs and crocheted figures."></figure>
    <p class="note">Interactive cabinet coming soon.</p>
    <a class="back" href="../#beyond-research">Back to Beyond Research</a>
  </main>
  <script>var root=document.documentElement,button=document.getElementById('themeToggle'),saved=localStorage.getItem('cabinet-theme');root.setAttribute('data-theme',saved||'dark');function sync(){var dark=root.getAttribute('data-theme')==='dark';button.setAttribute('aria-pressed',String(dark));button.textContent=dark?'Use light theme':'Use dark theme'}sync();button.addEventListener('click',function(){var next=button.getAttribute('aria-pressed')==='true'?'light':'dark';root.setAttribute('data-theme',next);localStorage.setItem('cabinet-theme',next);sync()});</script>
</body>
</html>
