<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>The Cabinet of Curiosities · Martyna Zwoińska</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#fbfaf7;--surface:#fff;--text:#1f2328;--soft:#55606b;--emerald:#1c7a52;--gold:#a88445;--violet:#6b4a73;--display:'Cormorant Garamond',Georgia,serif;--sans:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
    @media(prefers-color-scheme:dark){:root{--bg:#14171a;--surface:#1c2024;--text:#eceef0;--soft:#b3bcc4;--emerald:#5fcb9d;--gold:#d2b66f;--violet:#c1a4ca}}
    :root[data-theme=dark]{--bg:#14171a;--surface:#1c2024;--text:#eceef0;--soft:#b3bcc4;--emerald:#5fcb9d;--gold:#d2b66f;--violet:#c1a4ca}
    :root[data-theme=light]{--bg:#fbfaf7;--surface:#fff;--text:#1f2328;--soft:#55606b;--emerald:#1c7a52;--gold:#a88445;--violet:#6b4a73}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);line-height:1.6}.page{width:min(1120px,calc(100% - 32px));margin:auto;padding:28px 0 48px}.top{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:28px}a{color:var(--emerald);font-weight:650}.theme{border:1px solid var(--emerald);border-radius:999px;background:var(--surface);color:var(--text);padding:7px 12px;cursor:pointer}h1{font-family:var(--display);font-size:clamp(2.4rem,7vw,4.8rem);line-height:1;margin:0 0 28px;text-align:center}.cabinet-frame{padding:10px;border:1px solid var(--emerald);border-radius:30px 12px 28px 14px;background:var(--surface);box-shadow:inset 0 0 0 5px var(--surface),inset 0 0 0 6px var(--gold)}.cabinet-frame img{display:block;width:100%;height:min(72vh,900px);object-fit:contain;border-radius:20px 7px 18px 8px}.note{text-align:center;color:var(--soft);font-family:var(--display);font-size:1.4rem;margin:24px 0 10px}.back{display:block;text-align:center}a:focus-visible,.theme:focus-visible{outline:3px solid var(--gold);outline-offset:4px}@media(max-width:600px){.page{width:min(100% - 20px,1120px);padding-top:18px}.top{align-items:flex-start}.cabinet-frame{padding:7px}.cabinet-frame img{height:auto}}
  </style>
</head>
<body>
  <main class="page">
    <header class="top"><a href="../">← Homepage</a><button class="theme" id="themeToggle" type="button" aria-pressed="false">Toggle theme</button></header>
    <h1>The Cabinet of Curiosities</h1>
    <figure class="cabinet-frame"><img src="assets/cabinet-of-curiosities.png" alt="Art Nouveau cabinet display containing chocolate wrappers, two crocheted eye motifs and crocheted figures."></figure>
    <p class="note">Interactive cabinet coming soon.</p>
    <a class="back" href="../#beyond-research">Back to Beyond Research</a>
  </main>
  <script>var root=document.documentElement,button=document.getElementById('themeToggle'),saved=localStorage.getItem('theme');if(saved)root.setAttribute('data-theme',saved);function sync(){var dark=root.getAttribute('data-theme')==='dark'||(!root.getAttribute('data-theme')&&matchMedia('(prefers-color-scheme:dark)').matches);button.setAttribute('aria-pressed',String(dark));button.textContent=dark?'Use light theme':'Use dark theme'}sync();button.addEventListener('click',function(){var next=button.getAttribute('aria-pressed')==='true'?'light':'dark';root.setAttribute('data-theme',next);localStorage.setItem('theme',next);sync()});</script>
</body>
</html>
